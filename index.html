<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة أداء الموظف</title>
    <style>
        :root { --bg: #050505; --card: #111111; --accent: #deff9a; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; width: 350px; border: 1px solid #333; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; border-radius: 8px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: black; }
        .data-row { display: flex; justify-content: space-between; margin: 10px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        #dashboard { display: none; }
    </style>
</head>
<body>

    <div id="loginSection" class="card">
        <h3>تسجيل الدخول</h3>
        <input type="text" id="username" placeholder="رقم الملف">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button id="loginBtn" onclick="login()">دخول</button>
    </div>

    <div id="dashboard" class="card">
        <h2 id="dispName" style="color: var(--accent)">--</h2>
        <div class="data-row"><span>رقم الملف:</span> <span id="dispID">--</span></div>
        <div class="data-row"><span>التارجت:</span> <span id="dispTarget">--</span></div>
        <div class="data-row"><span>الحضور:</span> <span id="dispAtt">--</span></div>
        <div class="data-row"><span>الغياب:</span> <span id="dispAbs">--</span></div>
        <div class="data-row"><span>الخصومات:</span> <span id="dispDed">--</span></div>
        <button onclick="location.reload()" style="background:#333; color:white; margin-top:20px;">خروج</button>
    </div>

    <script>
        async function login() {
            const btn = document.getElementById('loginBtn');
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            // الرابط الذي أرسلته قمت بدمجه هنا
            const url = "https://script.google.com/macros/s/AKfycby0EllzsdlL31ffTdLyCE1uOf3Akxqrb_dwXbF7CRGjX50UrmjiqDVdCOm_lEQD3ZRo/exec";
            
            btn.innerText = "جاري التحقق...";
            btn.disabled = true;

            try {
                const response = await fetch(`${url}?username=${user}&password=${pass}`);
                const res = await response.json();
                
                if (res.status === "success") {
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    document.getElementById('dispName').innerText = res.name;
                    document.getElementById('dispID').innerText = res.fileID;
                    document.getElementById('dispTarget').innerText = res.target + "%";
                    document.getElementById('dispAtt').innerText = res.attendance + " يوم";
                    document.getElementById('dispAbs').innerText = res.absence + " يوم";
                    document.getElementById('dispDed').innerText = res.deductions + " ج.م";
                } else {
                    alert("بيانات خاطئة، يرجى التأكد من رقم الملف وكلمة المرور");
                }
            } catch (error) {
                alert("خطأ في الاتصال، تأكد من إعدادات الـ Deployment في جوجل سكربت");
            } finally {
                btn.innerText = "دخول";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
