<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Employee Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
            background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070') center/cover; 
            font-family: 'Cairo', sans-serif;
        }
        
        .card { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 40px; width: 350px; text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); transition: 0.5s;
        }

        input { 
            width: 100%; padding: 18px; margin: 10px 0; background: #f0f0f0; 
            border: 2px solid transparent; border-radius: 20px; text-align: center; 
            font-size: 16px; box-sizing: border-box; transition: 0.3s;
        }
        input:focus { border: 2px solid #000; outline: none; }

        button { 
            width: 100%; padding: 18px; margin-top: 15px; background: #000; 
            color: #fff; border: none; border-radius: 20px; font-weight: 700; cursor: pointer;
        }
        button:disabled { background: #666; cursor: wait; }

        #dashboard { display: none; }
        .info-card { background: #000; color: #fff; padding: 25px; border-radius: 25px; margin: 20px 0; }
        .data-row { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; }
        .label { color: #888; font-size: 12px; }
        .value { font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card" id="loginArea">
    <h2 style="margin-bottom: 25px;">تسجيل الدخول</h2>
    <input type="text" id="user" placeholder="اسم المستخدم">
    <input type="password" id="pass" placeholder="كلمة المرور">
    <button id="loginBtn" onclick="login()">دخول إلى النظام</button>
</div>

<div id="dashboard" class="card">
    <h2 style="margin-bottom: 5px;">لوحة البيانات</h2>
    <p style="color: #666; margin-bottom: 20px;">أهلاً بك في نظام المتابعة</p>
    
    <div class="info-card">
        <div class="data-row">
            <span class="value" id="resName">--</span>
            <span class="label">الاسم 👤</span>
        </div>
        <div class="data-row">
            <span class="value" id="resID">--</span>
            <span class="label">رقم الملف 🆔</span>
        </div>
        <div class="data-row">
            <span class="value" id="resTarget" style="color: #deff9a;">--</span>
            <span class="label">التارجت 🎯</span>
        </div>
    </div>
    
    <button onclick="location.reload()" style="background:#f44336;">تسجيل خروج</button>
</div>

<script>
// دعم زر Enter
document.addEventListener("keypress", function(event) {
    if (event.key === "Enter") login();
});

function login() {
    const user = document.getElementById('user').value;
    const pass = document.getElementById('pass').value;
    const btn = document.getElementById('loginBtn');
    
    if(!user || !pass) return alert("يرجى إدخال البيانات كاملة");

    btn.innerText = "جاري التحقق...";
    btn.disabled = true;

    const url = "https://script.google.com/macros/s/AKfycby0EllzsdlL31ffTdLyCE1uOf3Akxqrb_dwXbF7CRGjX50UrmjiqDVdCOm_lEQD3ZRo/exec";
    const script = document.createElement('script');
    script.src = `${url}?username=${user}&password=${pass}&callback=handleResponse`;
    document.body.appendChild(script);
}

function handleResponse(res) {
    const btn = document.getElementById('loginBtn');
    if (res.status === "success") {
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('resName').innerText = res.name;
        document.getElementById('resID').innerText = res.fileID;
        document.getElementById('resTarget').innerText = res.target + "%";
    } else {
        alert("خطأ: بيانات الدخول غير صحيحة");
        btn.innerText = "دخول إلى النظام";
        btn.disabled = false;
    }
}
</script>
</body>
</html>
