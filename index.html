<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الموظف</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
        .input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #dashboard { display: none; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-item { background: #334155; padding: 15px; border-radius: 12px; border: 1px solid #475569; }
        .stat-item b { font-size: 1.2em; color: #38bdf8; }
    </style>
</head>
<body>

<div class="card" id="login">
    <h2>تسجيل الدخول</h2>
    <input type="text" id="u" class="input" placeholder="اسم المستخدم">
    <input type="password" id="p" class="input" placeholder="كلمة المرور">
    <button class="btn" onclick="login()">دخول إلى النظام</button>
</div>

<div class="card" id="dashboard">
    <h2 id="welcomeText">مرحباً بك</h2>
    <p>إليك آخر التحديثات الخاصة ببياناتك:</p>
    <small style="color: #94a3b8; display: block; margin-bottom: 15px;">
        برجاء عدم مشاركة كلمة المرور مع أي شخص آخر لضمان سرية بياناتك.
    </small>
    
    <div class="stat-grid">
        <div class="stat-item">أيام الحضور<br><b id="att">--</b></div>
        <div class="stat-item">أيام الغياب<br><b id="abs">--</b></div>
        <div class="stat-item">التارجت المحقق<br><b id="tar">--</b></div>
        <div class="stat-item">الخصومات<br><b id="ded">--</b></div>
    </div>
    <button class="btn" style="margin-top:20px; background:#ef4444;" onclick="location.reload()">تسجيل خروج</button>
</div>

<script>
function login() {
    const url = "https://script.google.com/macros/s/AKfycby0EllzsdlL31ffTdLyCE1uOf3Akxqrb_dwXbF7CRGjX50UrmjiqDVdCOm_lEQD3ZRo/exec"; // <--- ضع الرابط هنا
    const script = document.createElement('script');
    script.src = `${url}?username=${document.getElementById('u').value}&password=${document.getElementById('p').value}&callback=res`;
    document.body.appendChild(script);
}
function res(data) {
    if(data.status == "success") {
        document.getElementById('login').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('welcomeText').innerText = "مرحباً بك، " + data.name;
        document.getElementById('att').innerText = data.attend;
        document.getElementById('abs').innerText = data.absent;
        document.getElementById('tar').innerText = data.target + "%";
        document.getElementById('ded').innerText = data.deductions;
    } else { alert("اسم المستخدم أو كلمة المرور غير صحيحة"); }
}
</script>
</body>
</html>
