<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الموظف</title>
    <style>
        body { 
            background: #0f172a; color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
        }
        .card { 
            background: #1e293b; padding: 35px; border-radius: 20px; 
            width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center; border: 1px solid #334155;
        }
        .input { 
            width: 100%; padding: 14px; margin: 12px 0; border-radius: 10px; 
            border: 1px solid #475569; background: #0f172a; color: white; 
            box-sizing: border-box; font-size: 16px; text-align: center;
        }
        .input:focus { outline: none; border-color: #38bdf8; }
        .btn { 
            width: 100%; padding: 14px; background: #3b82f6; color: white; 
            border: none; border-radius: 10px; cursor: pointer; 
            font-weight: bold; font-size: 16px; margin-top: 10px; transition: 0.3s;
        }
        .btn:hover { background: #2563eb; }
        
        #dashboard { display: none; }
        
        .stat-grid { 
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 15px; margin-top: 25px; 
        }
        .stat-item { 
            background: #334155; padding: 20px 10px; border-radius: 15px; 
            border: 1px solid #475569; font-size: 14px; color: #cbd5e1;
        }
        .stat-item b { 
            display: block; font-size: 24px; color: #38bdf8; margin-top: 8px; 
        }
    </style>
</head>
<body>

<div class="card" id="login">
    <h2 style="margin-bottom: 25px;">تسجيل الدخول</h2>
    <input type="text" id="u" class="input" placeholder="رقم الملف">
    <input type="password" id="p" class="input" placeholder="كلمة المرور">
    <button class="btn" type="button" id="loginBtn" onclick="login()">دخول إلى النظام</button>
</div>

<div class="card" id="dashboard">
    <h2 id="welcomeText" style="color: #f8fafc; margin-bottom: 5px;">مرحباً بك</h2>
    <p style="color: #cbd5e1; font-size: 15px;">إليك آخر التحديثات الخاصة ببياناتك:</p>
    
    <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); padding: 10px; border-radius: 10px; margin: 15px 0;">
        <small style="color: #fca5a5; display: block; line-height: 1.5;">
            🔒 برجاء عدم مشاركة كلمة المرور مع أي شخص آخر لضمان سرية بياناتك.
        </small>
    </div>
    
    <div class="stat-grid">
        <div class="stat-item">أيام الحضور<b id="att">--</b></div>
        <div class="stat-item">أيام الغياب<b id="abs">--</b></div>
        <div class="stat-item">التارجت المحقق<b id="tar">--</b></div>
        <div class="stat-item" style="border-color: rgba(239, 68, 68, 0.5);">الخصومات<b id="ded" style="color: #f87171;">--</b></div>
    </div>
    
    <button class="btn" style="margin-top:25px; background:#ef4444;" onclick="location.reload()">تسجيل خروج</button>
</div>

<script>
// دعم زر Enter للقيام بعملية الدخول
document.addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        login();
    }
});

function login() {
    const url = "https://script.google.com/macros/s/AKfycby0EllzsdlL31ffTdLyCE1uOf3Akxqrb_dwXbF7CRGjX50UrmjiqDVdCOm_lEQD3ZRo/exec";
    const u = document.getElementById('u').value;
    const p = document.getElementById('p').value;
    const loginBtn = document.getElementById('loginBtn');
    
    if(u === "" || p === "") {
        alert("برجاء إدخال رقم الملف وكلمة المرور");
        return;
    }
    
    loginBtn.innerText = "جاري التحقق من البيانات...";
    loginBtn.style.background = "#64748b";
    loginBtn.disabled = true;
    
    const script = document.createElement('script');
    script.src = `${url}?username=${u}&password=${p}&callback=res`;
    document.body.appendChild(script);
}

function res(data) {
    const loginBtn = document.getElementById('loginBtn');
    
    if(data.status === "success") {
        document.getElementById('login').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        
        document.getElementById('welcomeText').innerText = "مرحباً بك، " + data.name;
        document.getElementById('att').innerText = data.attend;
        document.getElementById('abs').innerText = data.absent;
        document.getElementById('tar').innerText = data.target + "%";
        document.getElementById('ded').innerText = data.deductions;
    } else {
        alert("تأكد من صحة رقم الملف وكلمة المرور");
        loginBtn.innerText = "دخول إلى النظام";
        loginBtn.style.background = "#3b82f6";
        loginBtn.disabled = false;
    }
}
</script>
</body>
</html>
