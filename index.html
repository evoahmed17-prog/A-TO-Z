<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Employee Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #2c3e50, #000); font-family: 'Cairo', sans-serif; overflow: hidden; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 30px; width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); color: white; transition: all 0.4s ease; }
        h2 { color: #fff; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; text-align: right; box-sizing: border-box; color: white; }
        button { width: 100%; padding: 15px; margin-top: 10px; background: #fff; color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        .progress-container { width: 100%; background: #333; border-radius: 10px; height: 10px; margin: 15px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: #00ffcc; width: 0%; transition: width 1.5s ease-in-out; }

        .footer { position: fixed; bottom: 20px; width: 100%; text-align: center; color: rgba(255,255,255,0.5); font-size: 12px; }
        
        .tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 5px; border: none; border-radius: 10px; background: rgba(255,255,255,0.1); color: white; cursor: pointer; font-size: 11px; transition: 0.3s; }
        .tab-btn.active { background: #fff; color: #000; }
        
        #dataDisplay { padding: 20px; font-size: 20px; background: rgba(0,0,0,0.3); border-radius: 15px; color: #00ffcc; font-weight: bold; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .logout { background: #ff4757 !important; color: white !important; }
        #dashboard { display: none; }
    </style>
</head>
<body>

<div id="welcomeModal" style="display:flex; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); z-index:1000; justify-content:center; align-items:center;">
    <div class="card">
        <h2 style="color: #00ffcc;">أهلاً بك!</h2>
        <p>بوابة الموظف المطورة. هذه نسخة تجريبية.</p>
        <button onclick="document.getElementById('welcomeModal').style.display='none'">فهمت ذلك</button>
    </div>
</div>

<div class="card" id="loginArea">
    <h2>تسجيل دخول الموظفين</h2>
    <input type="text" id="user" placeholder="اسم المستخدم">
    <input type="password" id="pass" placeholder="كلمة المرور" onkeypress="if(event.key==='Enter') login()">
    <button onclick="login()">دخول</button>
</div>

<div id="dashboard" class="card">
    <h2 id="userNameDisplay">--</h2>
    <div style="margin-bottom: 5px;">نسبة التارجت: <span id="resTarget">0</span>%</div>
    <div class="progress-container"><div id="progBar" class="progress-bar"></div></div>
    
    <div class="tabs">
        <button class="tab-btn active" id="btn1" onclick="showData('attendance', 'btn1')">الحضور</button>
        <button class="tab-btn" id="btn2" onclick="showData('absence', 'btn2')">الغياب</button>
        <button class="tab-btn" id="btn3" onclick="showData('deduction', 'btn3')">الخصومات</button>
        <button class="tab-btn" id="btn4" onclick="showData('allowance', 'btn4')">بدل طبيعة</button>
        <button class="tab-btn" id="btn5" onclick="showData('adminPenalty', 'btn5')">خصم إداري</button>
        <button class="tab-btn" id="btn6" onclick="showData('bonuses', 'btn6')">المكافآت</button>
    </div>
    <div id="dataDisplay">--</div>
    <button class="logout" onclick="location.reload()">تسجيل خروج</button>
</div>

<div class="footer">
    Create By: Ahmed Abdelfattah | 
    <a href="https://wa.me/201050662535" style="color: #00ffcc; text-decoration: none;">
        WhatsApp: 01050662535
    </a>
</div>

<script>
let userData = {};
const scriptUrl = "https://script.google.com/macros/s/AKfycby0EllzsdlL31ffTdLyCE1uOf3Akxqrb_dwXbF7CRGjX50UrmjiqDVdCOm_lEQD3ZRo/exec";

function login() {
    const user = document.getElementById('user').value;
    const pass = document.getElementById('pass').value;
    const script = document.createElement('script');
    script.src = `${scriptUrl}?username=${user}&password=${pass}&callback=handleResponse`;
    document.body.appendChild(script);
}

function handleResponse(res) {
    if (res.status === "success") {
        userData = res;
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('userNameDisplay').innerText = res.name;
        document.getElementById('resTarget').innerText = res.target;
        document.getElementById('progBar').style.width = res.target + "%";
        showData('attendance', 'btn1');
    } else { alert("بيانات الدخول غير صحيحة"); }
}

function showData(type, btnId) {
    const labels = { 
        attendance: "أيام الحضور", absence: "أيام الغياب", deduction: "أيام الخصم", 
        allowance: "بدل طبيعة العمل", adminPenalty: "أيام خصم إداري", bonuses: "أيام المكافأة" 
    };
    let val = userData[type] || 0;
    val = (type === 'allowance') ? val + " جنيه" : val + " يوم";
    document.getElementById('dataDisplay').innerText = labels[type] + ": " + val;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(btnId).classList.add('active');
}
</script>
</body>
</html>
