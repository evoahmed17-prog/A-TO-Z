<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Employee Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
            background: #f4f7f6; font-family: 'Cairo', sans-serif; 
        }
        .card { 
            background: #ffffff; padding: 40px; border-radius: 12px; width: 450px; 
            text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid #e0e0e0;
        }
        h2 { color: #333; font-size: 22px; margin-bottom: 20px; }
        input { 
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; 
            border-radius: 6px; text-align: right; box-sizing: border-box; 
        }
        button { 
            width: 100%; padding: 12px; margin-top: 10px; background: #2563eb; 
            color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; 
        }
        .tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
        .tab-btn { 
            padding: 10px 5px; border: 1px solid #e0e0e0; border-radius: 6px; 
            background: #fff; cursor: pointer; font-size: 12px; transition: 0.2s;
        }
        .tab-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }
        #dataDisplay { 
            padding: 20px; font-size: 20px; background: #f8fafc; border: 1px solid #e2e8f0;
            border-radius: 8px; color: #1e293b; font-weight: bold; margin-bottom: 20px;
        }
        .logout { background: #ef4444 !important; }
        #dashboard { display: none; }
    </style>
</head>
<body>

<div class="card" id="loginArea">
    <h2>تسجيل دخول الموظفين</h2>
    <input type="text" id="user" placeholder="اسم المستخدم">
    <input type="password" id="pass" placeholder="كلمة المرور" onkeypress="if(event.key==='Enter') login()">
    <button onclick="login()">دخول</button>
</div>

<div id="dashboard" class="card">
    <h2 id="userNameDisplay">--</h2>
    <div style="margin-bottom: 20px; font-size: 14px; color: #666; border-bottom: 1px solid #eee; padding-bottom: 10px;">
        🆔 الرقم: <span id="resID" style="font-weight:bold;">--</span> | 🎯 التارجت: <span id="resTarget" style="font-weight:bold;">--</span>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btn1" onclick="showData('attendance', 'btn1')">الحضور</button>
        <button class="tab-btn" id="btn2" onclick="showData('absence', 'btn2')">الغياب</button>
        <button class="tab-btn" id="btn3" onclick="showData('deduction', 'btn3')">الخصومات</button>
        <button class="tab-btn" id="btn4" onclick="showData('allowance', 'btn4')">بدل طبيعة</button>
        <button class="tab-btn" id="btn5" onclick="showData('adminPenalty', 'btn5')">خصم إداري</button>
        <button class="tab-btn" id="btn6" onclick="showData('bonuses', 'btn6')">المكافآت</button>
    </div>
    
    <div id="dataDisplay">--</div>
    <button class="logout" onclick="location.reload()">تسجيل خروج</button>
</div>

<script>
let userData = {};
const scriptUrl = "https://script.google.com/macros/s/AKfycby0EllzsdlL31ffTdLyCE1uOf3Akxqrb_dwXbF7CRGjX50UrmjiqDVdCOm_lEQD3ZRo/exec";

function login() {
    const user = document.getElementById('user').value;
    const pass = document.getElementById('pass').value;
    const script = document.createElement('script');
    script.src = `${scriptUrl}?username=${user}&password=${pass}&callback=handleResponse`;
    document.body.appendChild(script);
}

function handleResponse(res) {
    if (res.status === "success") {
        userData = res;
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('userNameDisplay').innerText = res.name;
        document.getElementById('resID').innerText = res.fileID;
        document.getElementById('resTarget').innerText = res.target + "%";
        showData('attendance', 'btn1');
    } else { alert("بيانات الدخول غير صحيحة"); }
}

function showData(type, btnId) {
    const labels = { 
        attendance: "أيام الحضور", absence: "أيام الغياب", deduction: "أيام الخصم", 
        allowance: "بدل طبيعة العمل", adminPenalty: "أيام خصم إداري", bonuses: "أيام المكافأة" 
    };
    let val = userData[type] || 0;
    val = (type === 'allowance') ? val + " جنيه" : val + " يوم";
    document.getElementById('dataDisplay').innerText = labels[type] + ": " + val;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(btnId).classList.add('active');
}
</script>
</body>
</html>
