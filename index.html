<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة أداء الموظف</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0a0a0a; color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background-color: #141414; padding: 40px; border-radius: 24px; border: 1px solid #222; width: 350px; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: #deff9a; color: black; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #dashboard { display: none; width: 400px; }
        .stat-val { font-size: 24px; color: #deff9a; font-weight: bold; }
    </style>
</head>
<body>

<div id="loginArea" class="card">
    <h2>تسجيل دخول الموظفين</h2>
    <input type="text" id="user" placeholder="اسم المستخدم">
    <input type="password" id="pass" placeholder="كلمة المرور">
    <button onclick="login()">دخول إلى النظام</button>
</div>

<div id="dashboard" class="card">
    <p>مرحباً بك،</p>
    <h2 id="resName">--</h2>
    <div style="background:#1a1a1a; padding:15px; border-radius:15px; margin:15px 0;">
        <p>رقم الملف: <span id="resID" class="stat-val">--</span></p>
        <p>التارجت المحقق: <span id="resTarget" class="stat-val">--</span></p>
    </div>
    <button style="background:#d9534f; color:white;" onclick="location.reload()">تسجيل خروج</button>
</div>

<script>
function login() {
    const user = document.getElementById('user').value;
    const pass = document.getElementById('pass').value;
    const url = "https://script.google.com/macros/s/AKfycby0EllzsdlL31ffTdLyCE1uOf3Akxqrb_dwXbF7CRGjX50UrmjiqDVdCOm_lEQD3ZRo/exec";
    
    const script = document.createElement('script');
    script.src = `${url}?username=${user}&password=${pass}&callback=handleResponse`;
    document.body.appendChild(script);
}

function handleResponse(res) {
    if (res.status === "success") {
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('resName').innerText = res.name;
        document.getElementById('resID').innerText = res.fileID;
        document.getElementById('resTarget').innerText = res.target + "%";
    } else {
        alert("خطأ: بيانات الدخول غير صحيحة");
    }
}
</script>
</body>
</html>
