<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الموظفين الرقمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
            background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070') center/cover; 
            font-family: 'Cairo', sans-serif; 
        }
        
        .card { 
            background: rgba(255, 255, 255, 0.85); /* خلفية شبه شفافة فاتحة */
            backdrop-filter: blur(10px); 
            padding: 40px; border-radius: 25px; 
            width: 350px; text-align: center; 
            color: #000; /* اللون الأسود للنصوص */
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            font-weight: 700; /* Bold */
        }

        input { 
            width: 100%; padding: 14px; margin: 10px 0; 
            background: rgba(0,0,0,0.05); border: 2px solid #000; 
            border-radius: 12px; color: #000; font-weight: bold;
            box-sizing: border-box; text-align: center;
        }

        button { 
            width: 100%; padding: 14px; margin-top: 15px; background: #000; 
            color: #fff; border: none; border-radius: 12px; 
            font-weight: 700; cursor: pointer; font-size: 16px;
        }

        .data-box { 
            text-align: right; background: rgba(0,0,0,0.05); 
            padding: 20px; border-radius: 15px; margin: 20px 0;
            border-right: 5px solid #000;
        }
        .data-row { display: flex; justify-content: space-between; margin: 10px 0; }
        #dashboard { display: none; }
    </style>
</head>
<body>

<div class="card" id="loginArea">
    <h2 style="margin-bottom: 20px;">تسجيل الدخول</h2>
    <input type="text" id="user" placeholder="اسم المستخدم">
    <input type="password" id="pass" placeholder="كلمة المرور">
    <button onclick="login()">دخول إلى النظام</button>
</div>

<div id="dashboard" class="card">
    <h2 style="border-bottom: 2px solid #000; padding-bottom: 10px;">بطاقة الموظف</h2>
    <div class="data-box">
        <div class="data-row"><span>👤 الاسم:</span> <span id="resName"></span></div>
        <div class="data-row"><span>🆔 رقم الملف:</span> <span id="resID"></span></div>
        <div class="data-row"><span>🎯 التارجت:</span> <span id="resTarget" style="color: #d9534f;"></span></div>
    </div>
    <button onclick="location.reload()">تسجيل خروج</button>
</div>

<script>
function login() {
    const user = document.getElementById('user').value;
    const pass = document.getElementById('pass').value;
    const url = "https://script.google.com/macros/s/AKfycby0EllzsdlL31ffTdLyCE1uOf3Akxqrb_dwXbF7CRGjX50UrmjiqDVdCOm_lEQD3ZRo/exec";
    
    const script = document.createElement('script');
    script.src = `${url}?username=${user}&password=${pass}&callback=handleResponse`;
    document.body.appendChild(script);
}

function handleResponse(res) {
    if (res.status === "success") {
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('resName').innerText = res.name;
        document.getElementById('resID').innerText = res.fileID;
        document.getElementById('resTarget').innerText = res.target + "%";
    } else {
        alert("خطأ في بيانات الدخول");
    }
}
</script>
</body>
</html>
