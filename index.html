<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Employee Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070') center/cover; font-family: 'Cairo', sans-serif; }
        .card { background: rgba(255, 255, 255, 0.98); padding: 40px; border-radius: 30px; width: 400px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 15px; text-align: center; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #000; outline: none; }
        button { width: 100%; padding: 15px; margin-top: 10px; background: #000; color: #fff; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        button:hover { background: #333; }
        
        /* تصميم التبويبات الجديد */
        .tabs { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; background: #f0f0f0; border: none; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .tab-btn.active { background: #000; color: #fff; }
        
        #dashboard { display: none; }
        .welcome-msg { font-size: 18px; margin-bottom: 10px; color: #333; }
        .quote { font-size: 14px; color: #666; font-style: italic; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="card" id="loginArea">
    <h2 id="welcomeText">أهلاً بك يا بطل!</h2>
    <p id="quoteText">"النجاح يبدأ بخطوة، استعد للإنجاز اليوم."</p>
    <input type="text" id="user" placeholder="اسم المستخدم">
    <input type="password" id="pass" placeholder="كلمة المرور" onkeypress="checkEnter(event)">
    <button onclick="login()">دخول</button>
</div>

<div id="dashboard" class="card">
    <h2 id="userNameDisplay">مرحباً بك</h2>
    <div class="tabs">
        <button class="tab-btn active" id="btn1" onclick="showData('attendance', 'btn1')">الحضور</button>
        <button class="tab-btn" id="btn2" onclick="showData('absence', 'btn2')">الغياب</button>
        <button class="tab-btn" id="btn3" onclick="showData('deduction', 'btn3')">الخصومات</button>
    </div>
    <div id="dataDisplay" style="padding: 20px; font-size: 24px; font-weight: bold; color: #000; background: #f8f8f8; border-radius: 15px;">--</div>
    <button onclick="location.reload()" style="background:#d9534f; margin-top:20px;">تسجيل خروج</button>
</div>

<script>
let userData = {};

// خاصية الضغط على زر Enter
function checkEnter(event) {
    if (event.key === "Enter") login();
}

function login() {
    const user = document.getElementById('user').value;
    const pass = document.getElementById('pass').value;
    const url = "https://script.google.com/macros/s/AKfycby0EllzsdlL31ffTdLyCE1uOf3Akxqrb_dwXbF7CRGjX50UrmjiqDVdCOm_lEQD3ZRo/exec"; // تأكد من وضع الرابط الخاص بك هنا
    const script = document.createElement('script');
    script.src = `${url}?username=${user}&password=${pass}&callback=handleResponse`;
    document.body.appendChild(script);
}

function handleResponse(res) {
    if (res.status === "success") {
        userData = res;
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('userNameDisplay').innerText = "مرحباً، " + res.name;
        showData('attendance', 'btn1'); // عرض الحضور تلقائياً عند الدخول
    } else { alert("بيانات الدخول غير صحيحة"); }
}

function showData(type, btnId) {
    const display = document.getElementById('dataDisplay');
    const labels = { attendance: "أيام الحضور", absence: "أيام الغياب", deduction: "الخصومات" };
    display.innerText = labels[type] + ": " + (userData[type] || 0);
    
    // تفعيل وتغيير لون الزر المختار
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(btnId).classList.add('active');
}
</script>
</body>
</html>
