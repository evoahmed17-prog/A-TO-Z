<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* خلفية الغابة الليلية */
            background: linear-gradient(to bottom, #4a148c, #6a1b9a, #9c27b0);
            background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070'); /* يمكنك استبدال الرابط بصورة غابة أرجوانية */
            background-size: cover;
            font-family: sans-serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 350px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h2 { margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            color: white;
            box-sizing: border-box;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="login-card" id="loginArea">
    <h2>Login</h2>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- هنا ستوضع لوحة التحكم بعد نجاح الدخول -->
<div id="dashboard" class="login-card" style="display:none;">
    <h2>Welcome Back!</h2>
    <p id="resName"></p>
    <button onclick="location.reload()">Logout</button>
</div>

<script>
function login() {
    const user = document.getElementById('user').value;
    const pass = document.getElementById('pass').value;
    const url = "https://script.google.com/macros/s/AKfycby0EllzsdlL31ffTdLyCE1uOf3Akxqrb_dwXbF7CRGjX50UrmjiqDVdCOm_lEQD3ZRo/exec";
    
    const script = document.createElement('script');
    script.src = `${url}?username=${user}&password=${pass}&callback=handleResponse`;
    document.body.appendChild(script);
}

function handleResponse(res) {
    if (res.status === "success") {
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('resName').innerText = "Hello, " + res.name;
    } else {
        alert("Invalid login!");
    }
}
</script>
</body>
</html>
