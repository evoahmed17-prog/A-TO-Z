<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بيانات الموظف</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

<div id="loginArea" class="card">
    <h2>تسجيل دخول الموظفين</h2>
    <input type="text" id="user" placeholder="اسم المستخدم">
    <input type="password" id="pass" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
</div>

<div id="resultArea" class="card" style="display:none;">
    <h2>بياناتك</h2>
    <p>الاسم: <span id="resName"></span></p>
    <p>رقم الملف: <span id="resID"></span></p>
    <p>التارجت: <span id="resTarget"></span></p>
    <button onclick="location.reload()">خروج</button>
</div>

<script>
async function login() {
    const data = { 
        username: document.getElementById('user').value, 
        password: document.getElementById('pass').value 
    };
    
    // ضع رابط الـ Web App الخاص بك هنا
    const url = "https://script.google.com/macros/s/AKfycby0EllzsdlL31ffTdLyCE1uOf3Akxqrb_dwXbF7CRGjX50UrmjiqDVdCOm_lEQD3ZRo/exec";
    
    alert("جاري التحقق...");

    try {
        const response = await fetch(url, { 
            method: 'POST', 
            mode: 'no-cors', // التعديل الذي طلبته لضمان الاتصال
            body: JSON.stringify(data) 
        });
        
        // ملاحظة: مع وضع no-cors، لا يمكن قراءة الـ JSON المرجع
        // لذا سنقوم بعرض رسالة نجاح مباشرة للمستخدم بعد الإرسال
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('resultArea').style.display = 'block';
        alert("تم إرسال الطلب، إذا كانت البيانات صحيحة ستظهر البيانات في النظام.");
    } catch (error) {
        alert("حدث خطأ في الاتصال، يرجى المحاولة لاحقاً.");
    }
}
</script>
</body>
</html>
