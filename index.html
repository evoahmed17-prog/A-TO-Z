<script>
function login() {
    const url = "ضع_رابط_الـ_Exec_الجديد_هنا"; 
    const u = document.getElementById('u').value;
    const p = document.getElementById('p').value;
    const btn = document.getElementById('loginBtn');
    
    btn.innerText = "جاري التحقق...";
    
    const script = document.createElement('script');
    script.src = `${url}?username=${u}&password=${p}&callback=res`;
    document.body.appendChild(script);
}

function res(data) {
    if(data.status === "success") {
        // هنا يتم الانتقال لصفحة عرض البيانات
        alert("تم الدخول بنجاح!");
        console.log(data); // للتحقق من البيانات في الـ Console
        // يمكنك هنا كتابة كود إظهار الداشبورد
    } else {
        alert("بيانات الدخول غير صحيحة.");
        document.getElementById('loginBtn').innerText = "دخول إلى النظام";
    }
}
</script>
