<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة أداء الموظف</title>
    <style>
        :root { --bg: #050505; --card: #111111; --accent: #deff9a; --text: #ffffff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: var(--card); padding: 40px; border-radius: 24px; width: 350px; border: 1px solid #222; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--accent); }
        button { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; color: #000; transition: transform 0.2s; }
        button:hover { transform: scale(1.02); }
        #dashboard { display: none; }
        .emp-name { font-size: 28px; color: var(--accent); margin: 20px 0; font-weight: bold; }
        .progress-bar { height: 12px; background: #222; border-radius: 6px; overflow: hidden; margin: 20px 0; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 1.5s ease-in-out; }
    </style>
</head>
<body>

    <div id="loginSection" class="card">
        <h2>تسجيل الدخول</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="login()">دخول إلى النظام</button>
    </div>

    <div id="dashboard" class="card">
        <div class="emp-name" id="dispName">--</div>
        <div style="color: #888">رقم الملف: <span id="dispID">--</span></div>
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        <div id="dispTarget" style="font-size: 24px; font-weight: bold;">0%</div>
        <button onclick="location.reload()" style="background: transparent; color: #ff5555; border: 1px solid #333; margin-top: 20px;">تسجيل خروج</button>
    </div>

    <script>
        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            // الرابط الذي زودتني به
            const url = "https://script.google.com/macros/s/AKfycby0EllzsdlL31ffTdLyCE1uOf3Akxqrb_dwXbF7CRGjX50UrmjiqDVdCOm_lEQD3ZRo/exec";
            
            if(!user || !pass) { alert("يرجى إدخال البيانات"); return; }

            try {
                const response = await fetch(`${url}?username=${user}&password=${pass}`);
                const res = await response.json();
                
                if (res.status === "success") {
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    document.getElementById('dispName').innerText = res.name;
                    document.getElementById('dispID').innerText = res.fileID;
                    document.getElementById('dispTarget').innerText = res.target + "%";
                    document.getElementById('progressFill').style.width = res.target + "%";
                } else {
                    alert("بيانات الدخول غير صحيحة");
                }
            } catch (e) {
                alert("خطأ في الاتصال: تأكد من إعدادات الـ Deployment (Anyone)");
            }
        }
    </script>
</body>
</html>
