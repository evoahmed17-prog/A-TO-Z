<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Employee ID System</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
            background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070') center/cover; 
            font-family: 'Cairo', sans-serif; font-weight: 700;
        }
        
        .card { 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 30px; width: 350px; text-align: center; 
            color: #000; box-shadow: 0 15px 35px rgba(0,0,0,0.3); border: 2px solid #000;
        }

        input { 
            width: 100%; padding: 15px; margin: 10px 0; background: rgba(0,0,0,0.05); 
            border: 2px solid #000; border-radius: 15px; color: #000; font-weight: bold;
            box-sizing: border-box; text-align: center;
        }

        button { 
            width: 100%; padding: 15px; margin-top: 15px; background: #000; 
            color: #fff; border: none; border-radius: 15px; font-weight: 700; cursor: pointer;
        }

        .data-box { 
            background: rgba(0,0,0,0.05); padding: 25px; border-radius: 20px; margin: 20px 0;
            border: 2px solid #000; text-align: right;
        }
        
        .data-row { display: flex; justify-content: space-between; margin: 15px 0; }
        #dashboard { display: none; }
    </style>
</head>
<body>

<div class="card" id="loginArea">
    <h2 style="margin-bottom: 20px;">تسجيل الدخول</h2>
    <input type="text" id="user" placeholder="اسم المستخدم">
    <input type="password" id="pass" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
</div>

<div id="dashboard" class="card">
    <h2 style="border-bottom: 3px solid #000; padding-bottom: 10px;">Employee ID Card</h2>
    
    <div class="data-box">
        <div class="data-row">
            <span id="resName">--</span>
            <span>:Name 👤</span>
        </div>
        <div class="data-row">
            <span id="resID">--</span>
            <span>:ID Number 🆔</span>
        </div>
        <div class="data-row">
            <span id="resTarget" style="color: #d9534f;">--</span>
            <span>:Target 🎯</span>
        </div>
    </div>
    
    <button onclick="location.reload()">تسجيل خروج</button>
</div>

<script>
function login() {
    const user = document.getElementById('user').value;
    const pass = document.getElementById('pass').value;
    // تأكد من وضع رابط الـ /exec الخاص بك هنا
    const url = "https://script.google.com/macros/s/AKfycby0EllzsdlL31ffTdLyCE1uOf3Akxqrb_dwXbF7CRGjX50UrmjiqDVdCOm_lEQD3ZRo/exec";
    
    const script = document.createElement('script');
    script.src = `${url}?username=${user}&password=${pass}&callback=handleResponse`;
    document.body.appendChild(script);
}

function handleResponse(res) {
    if (res.status === "success") {
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('resName').innerText = res.name;
        document.getElementById('resID').innerText = res.fileID;
        document.getElementById('resTarget').innerText = res.target + "%";
    } else {
        alert("خطأ في بيانات الدخول");
    }
}
</script>
</body>
</html>
