<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة أداء الموظف</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --accent: #deff9a;
            --text: #ffffff;
            --subtext: #a0a0a0;
        }

        body {
            font-family: 'Segoe UI', 'Urbanist', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container { width: 350px; }

        .card {
            background-color: var(--card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid #222;
            text-align: center;
        }

        /* تنسيقات النموذج */
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--accent);
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        /* تنسيقات لوحة البيانات */
        .dashboard-card { display: none; }
        .emp-name { font-size: 28px; font-weight: 700; color: var(--accent); margin-bottom: 20px; }
        
        /* تصميم المؤشر المئوي الدائري البسيط */
        .gauge-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 20px auto;
            border: 8px solid #222;
            border-top: 8px solid var(--accent);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
        }

        .progress-bar { height: 10px; background: #222; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 1.5s; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loginSection" class="card">
            <h2>تسجيل الدخول</h2>
            <input type="text" id="username" placeholder="اسم المستخدم">
            <input type="password" id="password" placeholder="كلمة المرور">
            <button onclick="login()">دخول إلى النظام</button>
        </div>

        <div id="dashboardSection" class="card dashboard-card">
            <div class="welcome-msg">مرحباً بك،</div>
            <div id="dispName" class="emp-name">--</div>
            
            <div class="stat-item" style="margin-bottom:20px;">
                <span style="color:var(--subtext)">رقم الملف: </span>
                <span id="dispID" style="font-weight:bold;">--</span>
            </div>

            <div id="gauge" class="gauge-container">0%</div>

            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>

            <button onclick="location.reload()" style="background:transparent; color:#d9534f; border:1px solid #333; margin-top:20px;">تسجيل خروج</button>
        </div>
    </div>

    <script>
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const url = "https://script.google.com/macros/s/AKfycby0EllzsdlL31ffTdLyCE1uOf3Akxqrb_dwXbF7CRGjX50UrmjiqDVdCOm_lEQD3ZRo/exec";
            
            const script = document.createElement('script');
            script.src = `${url}?username=${user}&password=${pass}&callback=handleResponse`;
            document.body.appendChild(script);
        }

        function handleResponse(res) {
            if (res.status === "success") {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'block';
                document.getElementById('dispName').innerText = res.name;
                document.getElementById('dispID').innerText = res.fileID;
                
                // تحديث القيم
                document.getElementById('gauge').innerText = res.target + "%";
                document.getElementById('progressFill').style.width = res.target + "%";
            } else {
                alert("بيانات الدخول غير صحيحة");
            }
        }
    </script>
</body>
</html>
