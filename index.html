<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة أداء الموظف</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --accent: #deff9a;
            --text: #ffffff;
            --subtext: #a0a0a0;
        }

        body {
            font-family: 'Segoe UI', 'Urbanist', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* حاوية تسجيل الدخول */
        .login-card {
            background-color: var(--card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
            border: 1px solid #222;
        }

        h2 { margin-bottom: 30px; font-weight: 700; color: var(--accent); }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--accent);
            color: black;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.02); background-color: #c8f57e; }

        /* حاوية لوحة التحكم (مخفية في البداية) */
        .dashboard-card {
            display: none;
            background-color: var(--card);
            padding: 50px;
            border-radius: 30px;
            width: 450px;
            text-align: center;
            border: 1px solid #222;
            position: relative;
        }

        .welcome-msg { font-size: 18px; color: var(--subtext); margin-bottom: 5px; }
        .emp-name { font-size: 32px; font-weight: 700; margin-bottom: 30px; color: var(--accent); }

        .stat-item {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-label { color: var(--subtext); font-size: 14px; text-transform: uppercase; }
        .stat-value { font-size: 22px; font-weight: 700; color: #fff; }

        .target-container { margin-top: 30px; }
        .target-label { font-size: 16px; margin-bottom: 10px; color: var(--subtext); }
        .progress-bar {
            height: 15px;
            background: #222;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%; /* سيتم تحديثه برمجياً */
            box-shadow: 0 0 15px rgba(222, 255, 154, 0.4);
            transition: width 1.5s ease-in-out;
        }

        .logout-btn {
            background: none;
            border: 1px solid #333;
            color: #d9534f;
            margin-top: 30px;
            width: auto;
            padding: 10px 30px;
        }
        
        .logout-btn:hover { background: #d9534f; color: white; border-color: #d9534f; }
    </style>
</head>
<body>

    <div id="loginSection" class="login-card">
        <h2>تسجيل الدخول</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="login()">دخول إلى النظام</button>
    </div>

    <div id="dashboardSection" class="dashboard-card">
        <p class="welcome-msg">مرحباً بك،</p>
        <div id="dispName" class="emp-name">تحميل...</div>

        <div class="stat-item">
            <span class="stat-label">رقم الملف</span>
            <span id="dispID" class="stat-value">--</span>
        </div>

        <div class="target-container">
            <p class="target-label">نسبة الإنجاز المحققة</p>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div id="dispTarget" style="font-size: 36px; font-weight: 700; color: var(--accent);">0%</div>
        </div>

        <button class="logout-btn" onclick="location.reload()">تسجيل خروج</button>
    </div>

    <script>
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            // رابط الـ Web App الخاص بك
            const url = "https://script.google.com/macros/s/AKfycby0EllzsdlL31ffTdLyCE1uOf3Akxqrb_dwXbF7CRGjX50UrmjiqDVdCOm_lEQD3ZRo/exec";
            
            if(!user || !pass) { alert("يرجى إدخال البيانات كاملة"); return; }

            const script = document.createElement('script');
            script.src = `${url}?username=${user}&password=${pass}&callback=handleResponse`;
            document.body.appendChild(script);
        }

        function handleResponse(res) {
            if (res.status === "success") {
                // إخفاء صفحة الدخول وإظهار اللوحة
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'block';

                // تعبئة البيانات
                document.getElementById('dispName').innerText = res.name;
                document.getElementById('dispID').innerText = res.fileID;
                
                // تحريك التارجت
                const targetVal = res.target; // يفترض أن يكون رقم مثل 85
                document.getElementById('dispTarget').innerText = targetVal + "%";
                setTimeout(() => {
                    document.getElementById('progressFill').style.width = targetVal + "%";
                }, 200);

            } else {
                alert("خطأ: اسم المستخدم أو كلمة المرور غير صحيحة.");
            }
        }
    </script>
</body>
</html>

الآن، النظام يركز فقط على الموظف. أي بيانات يتم تحديثها في ملف الـ Google Sheets في الأعمدة المخصصة ستنعكس فوراً وبشكل جميل في هذه الواجهة. هل قمت بتجربتها؟
