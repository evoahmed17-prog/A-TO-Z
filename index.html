<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة أداء الموظف | برو-ترأك</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: #111111;
            --accent: #deff9a;
            --accent-hover: #c8f57e;
            --accent-muted: #8fa36a;
            --text: #f0f0f0;
            --subtext: #888888;
            --error: #ff5555;
            --shadow-dark: 0 10px 40px rgba(0,0,0,0.6);
            --shadow-neon: 0 0 15px rgba(222, 255, 154, 0.4);
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Urbanist', 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh; width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
            transition: transform 0.5s ease-out;
        }

        /* اللمسة الاحترافية 1: تأثير الكهرم اللامع "Glossy" */
        .card {
            background: linear-gradient(135deg, #111111 0%, #171717 100%);
            border-radius: 32px;
            padding: 50px 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: var(--shadow-dark), inset 0 1px 1px rgba(255,255,255,0.03);
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: opacity 0.4s ease;
        }

        .card::after {
            content: "";
            position: absolute;
            top: -100px; right: -100px;
            width: 200px; height: 200px;
            background: var(--accent);
            filter: blur(100px);
            opacity: 0.07;
        }

        /* --- صفحة تسجيل الدخول --- */
        .login-header {
            font-size: 20px; font-weight: 300; color: var(--subtext);
            letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px;
        }

        .login-title {
            font-size: 36px; font-weight: 700; color: #fff; margin-bottom: 40px;
        }

        .input-group { position: relative; margin-bottom: 20px; }

        /* اللمسة الاحترافية 2: مدخلات تفاعلية */
        input {
            width: 100%;
            padding: 18px 25px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            color: white;
            font-size: 16px; font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
